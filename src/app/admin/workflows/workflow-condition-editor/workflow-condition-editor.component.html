<div class="condition-editor">
  <!-- Single source: workflow data keys from API -->
  <section class="condition-section">
    <h4 class="section-title">
      <mat-icon>assignment</mat-icon>
      Workflow data required
    </h4>
    <p class="section-hint">Select keys that must exist in workflow data. Use only keys returned by the API (single source of truth).</p>
    <div *ngIf="loadingKeys" class="loading-keys">
      <mat-spinner diameter="24"></mat-spinner>
      <span>Loading workflow data keys...</span>
    </div>
    <div *ngIf="keysLoadError && !loadingKeys" class="keys-error">
      <mat-icon color="warn">error</mat-icon>
      <span>{{ keysLoadError }}</span>
    </div>
    <div *ngIf="!loadingKeys && keysWithBinding.length > 0" class="checkbox-list">
      <label *ngFor="let item of keysWithBinding" class="checkbox-item">
        <mat-checkbox
          [checked]="isDataKeyChecked(item.key)"
          (change)="onDataKeyChange(item.key, $event.checked)"
        >
          <span class="key-label">{{ item.label }}</span>
          <span class="kind-badge" [ngClass]="getKindBadgeClass(item.kind)">{{ item.kind }}</span>
        </mat-checkbox>
      </label>
    </div>
  </section>

  <section class="condition-section">
    <h4 class="section-title">
      <mat-icon>edit_note</mat-icon>
      Form fields
    </h4>
    <div class="form-fields-list">
      <div *ngFor="let row of formFields; let i = index" class="form-field-row">
        <mat-form-field appearance="outline" class="field-module">
          <mat-label>Module</mat-label>
          <mat-select
            [value]="row.moduleType"
            (selectionChange)="onFormFieldModuleChange(i, $event.value)"
          >
            <mat-option *ngFor="let m of moduleTypes" [value]="m.value">
              {{ m.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="field-name">
          <mat-label>Field</mat-label>
          <mat-select
            [value]="row.fieldName"
            (selectionChange)="onFormFieldNameChange(i, $event.value)"
          >
            <mat-option *ngFor="let opt of getFieldOptions(row.moduleType)" [value]="opt.value">
              {{ opt.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <button mat-icon-button color="warn" type="button" (click)="removeFormField(i)" matTooltip="Remove">
          <mat-icon>remove_circle_outline</mat-icon>
        </button>
      </div>
      <button mat-stroked-button color="primary" type="button" (click)="addFormField()">
        <mat-icon>add</mat-icon>
        Add field
      </button>
    </div>
  </section>
</div>
