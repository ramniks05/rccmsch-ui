<div class="case-resubmit-container">
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">
        <mat-icon>edit</mat-icon>
        Edit & Resubmit Case
      </h1>
      <p class="page-subtitle" *ngIf="case">{{ case.caseNumber }}</p>
    </div>
    <div class="header-actions">
      <button mat-raised-button color="primary" [routerLink]="['/citizen/cases', caseId]" class="back-btn">
        <mat-icon>arrow_back</mat-icon>
        Back to Case Details
      </button>
    </div>
  </div>

  <div class="page-content">
    <div *ngIf="isLoading" class="loading-container">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Loading case details...</p>
    </div>

    <!-- Correction notice (optional) -->
    <div *ngIf="returnComment && !isLoading" class="correction-notice-bar">
      <mat-icon color="warn">info</mat-icon>
      <span>{{ returnComment }}</span>
    </div>

    <!-- Same form as new application, prefilled -->
    <app-dynamic-case-form
      *ngIf="!isLoading && prefillData && caseId"
      [resubmitCaseId]="caseId"
      [resubmitPrefill]="prefillData"
    ></app-dynamic-case-form>
  </div>
</div>
