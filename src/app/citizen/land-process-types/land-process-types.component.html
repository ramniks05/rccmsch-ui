<div class="services-container">

  <!-- Header — same pattern as Case Details -->
  <div class="header-section">
    <div class="header-left"></div>
    <div class="header-center">
      <!-- <span class="breadcrumb">Citizen &nbsp;/&nbsp; Land Services</span> -->
      <h2>Online Services</h2>
    </div>
    <div class="header-right"></div>
  </div>

  <!-- Subtitle -->
  <p class="page-subtitle">Select a service below to begin your application</p>

  <!-- Service Cards Grid -->
  <div class="services-grid">
    <div
      class="service-card"
      *ngFor="let p of processes"
      (click)="openForm(p)">

      <div class="card-accent-bar"></div>
      <div class="service-card-inner">
        <div class="service-icon-wrap">
          <mat-icon>{{ p.icon }}</mat-icon>
        </div>
        <div class="service-title">{{ p.title }}</div>
        <button
          mat-flat-button
          class="service-btn"
          (click)="openForm(p); $event.stopPropagation()">
          <span>Proceed</span>
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </div>

    </div>
  </div>

</div>
